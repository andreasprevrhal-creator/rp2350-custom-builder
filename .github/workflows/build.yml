name: Build Waveshare RP2350B Hybrid
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MicroPython
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          submodules: true

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi build-essential python3

      - name: Build mpy-cross
        run: make -C mpy-cross

      - name: Patch for Waveshare RP2350B-Plus-W Hybrid
        run: |
          BOARD_DIR="ports/rp2/boards/RPI_PICO2_W"
          # 1. PSRAM Konfiguration (GPIO 47)
          echo "#define MICROPY_HW_PSRAM_CS_PIN (47)" >> $BOARD_DIR/mpconfigboard.h
          echo "#define MICROPY_HW_PSRAM_MAX_SEG_SIZE (8 * 1024 * 1024)" >> $BOARD_DIR/mpconfigboard.h
          
          # 2. QMI & PSRAM Support aktivieren
          echo "#define MICROPY_HW_QMI_SUPPORT (1)" >> $BOARD_DIR/mpconfigboard.h
          
          # 3. WLAN Support (WICHTIG: CYW43 explizit für RP2350)
          echo "#define MICROPY_PY_NETWORK_CYW43 (1)" >> $BOARD_DIR/mpconfigboard.h
          
          # 4. PIO-Ressourcen Management (verhindert Konflikt)
          # Wir erzwingen, dass CYW43 eine eigene PIO-Instanz bekommt
          echo "#define CYW43_PIO_INSTANCE 1" >> $BOARD_DIR/mpconfigboard.h
          
          # 5. Architektur-Fix für RP2350B
          echo "#define MICROPY_HW_MCU_RP2350 (1)" >> $BOARD_DIR/mpconfigboard.h

      - name: Build Firmware
        run: |
          # BOARD_VARIANT=rp2350 ist entscheidend für den B-Chip
          make -C ports/rp2 BOARD=RPI_PICO2_W BOARD_VARIANT=rp2350

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: waveshare-hybrid-firmware
          path: ports/rp2/build-RPI_PICO2_W/firmware.uf2
