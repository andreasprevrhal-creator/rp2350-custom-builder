name: Build Custom MicroPython RP2350
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MicroPython
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          submodules: true

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi build-essential python3

      - name: Build mpy-cross
        run: make -C mpy-cross

      - name: Patch Board Definition (PSRAM on GPIO 47)
        run: |
          # Wir nutzen die Pico 2 W Basis und fügen den PSRAM-CS hinzu
          echo "#define MICROPY_HW_PSRAM_CS_PIN (47)" >> ports/rp2/boards/RPI_PICO2_W/mpconfigboard.h
          echo "#define MICROPY_HW_PSRAM_MAX_SEG_SIZE (8 * 1024 * 1024)" >> ports/rp2/boards/RPI_PICO2_W/mpconfigboard.h

      - name: Build Firmware
        run: |
          make -C ports/rp2 BOARD=RPI_PICO2_W

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: micropython-waveshare-psram-wlan
          path: ports/rp2/build-RPI_PICO2_W/firmware.uf2
