name: Build Debug MicroPython RP2350
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MicroPython
        uses: actions/checkout@v4
        with:
          repository: micropython/micropython
          submodules: true

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi build-essential python3

      - name: Build mpy-cross
        run: make -C mpy-cross

      - name: Patch Board Definition (Deep Debug)
        run: |
          CONF="ports/rp2/boards/RPI_PICO2_W/mpconfigboard.h"
          # PSRAM Konfiguration für Waveshare (GPIO 47)
          echo "#define MICROPY_HW_PSRAM_CS_PIN (47)" >> $CONF
          echo "#define MICROPY_HW_PSRAM_MAX_SEG_SIZE (8 * 1024 * 1024)" >> $CONF
          # RP2350 Spezifische Hardware-Unterstützung
          echo "#define MICROPY_HW_QMI_SUPPORT (1)" >> $CONF
          echo "#define MICROPY_HW_USB_VID (0x2E8A)" >> $CONF
          echo "#define MICROPY_HW_USB_PID (0x000A)" >> $CONF
          # Debugging für WLAN-Start aktivieren
          echo "#define CYW43_DEBUG (1)" >> $CONF

      - name: Build Firmware
        run: |
          # Wir erzwingen den Build für den RP2350 Chip-Typ
          make -C ports/rp2 BOARD=RPI_PICO2_W BOARD_VARIANT=rp2350

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-firmware-rp2350b
          path: ports/rp2/build-RPI_PICO2_W/firmware.uf2

